<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ClassVIP Transfers — Transportación privada de lujo en Los Cabos. SUVs premium, servicio 24/7, más de 30 años de experiencia." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="geo.region" content="MX-BCS" />
    <meta name="geo.placename" content="Los Cabos, Baja California Sur" />
    <meta name="geo.position" content="22.8905;-109.9167" />
    <meta name="ICBM" content="22.8905, -109.9167" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect a servicios externos para reducir latencia -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!-- Preload de la primera imagen del hero (elemento LCP de la home): el
         navegador la empieza a bajar antes de cargar React. Mismo URL/transform
         que cloudinary-assets.ts (q_auto:good,f_auto → WebP/AVIF). -->
    <link rel="preload" as="image" fetchpriority="high"
      href="https://res.cloudinary.com/dt9iyiorn/image/upload/q_auto:good,f_auto/v1774175174/classvip/hero-1.jpg" />

    <!--
      Google Fonts cargadas de forma NO bloqueante:
      1. rel="preload" as="style" → el browser descarga en paralelo sin bloquear render
      2. onload cambia rel="stylesheet" al terminar → aplica la fuente
      3. <noscript> es el fallback para bots sin JS (Google Bot sí ejecuta JS)
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap"
      />
    </noscript>

    <title>ClassVIP Transfers — Transportación de Lujo en Los Cabos</title>

    <!--
      JSON-LD ESTÁTICO (identidad del negocio) en el HTML crudo: lo ven TODOS los
      crawlers, incluidos los bots sociales y de IA (ChatGPT/Perplexity/Google AI)
      que NO ejecutan JavaScript. La home además inyecta LocalBusiness + FAQPage
      vía react-helmet para los que sí ejecutan JS. Esto da el 90% del beneficio
      de un prerender SIN el riesgo de meter Puppeteer al build (que puede romper
      el deploy). Mantener sincronizado con los datos del negocio.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Class VIP Transfers",
      "alternateName": "ClassVIP Transfers Los Cabos",
      "url": "https://www.classviptransfers.com",
      "logo": "https://www.classviptransfers.com/favicon.png",
      "description": "Luxury private airport transportation and adventure tours in Los Cabos, Mexico. 30+ years of experience serving 250+ hotels from SJD Airport.",
      "telephone": "+526241222174",
      "email": "Armando@classviptransfers.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Los Cabos",
        "addressRegion": "Baja California Sur",
        "addressCountry": "MX"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+526241222174",
        "contactType": "reservations",
        "areaServed": "MX",
        "availableLanguage": ["English", "Spanish"]
      },
      "sameAs": [
        "https://wa.me/5216241222174",
        "https://www.tripadvisor.com.mx/Attraction_Review-g152515-d10486878-Reviews-Class_VIP_Transfers-Cabo_San_Lucas_Los_Cabos_Baja_California.html"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Class VIP Transfers",
      "url": "https://www.classviptransfers.com",
      "inLanguage": ["en", "es"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
