<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ClassVIP Transfers — Transportación privada de lujo en Los Cabos. SUVs premium, servicio 24/7, más de 30 años de experiencia." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="geo.region" content="MX-BCS" />
    <meta name="geo.placename" content="Los Cabos, Baja California Sur" />
    <meta name="geo.position" content="22.8905;-109.9167" />
    <meta name="ICBM" content="22.8905, -109.9167" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Preconnect a servicios externos para reducir latencia -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

    <!--
      Google Fonts cargadas de forma NO bloqueante:
      1. rel="preload" as="style" → el browser descarga en paralelo sin bloquear render
      2. onload cambia rel="stylesheet" al terminar → aplica la fuente
      3. <noscript> es el fallback para bots sin JS (Google Bot sí ejecuta JS)
    -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap"
      />
    </noscript>

    <title>ClassVIP Transfers — Transportación de Lujo en Los Cabos</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
